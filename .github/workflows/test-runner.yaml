name: Test ECS Runner - 3 Jobs

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ECS_CLUSTER: my-ecs-demo
  TASK_DEFINITION: github-runner

jobs:

  start-runner:
    name: Start self-hosted runner
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      task_arn: ${{ steps.start.outputs.task_arn }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Start ECS runner task
        id: start
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0c971a6f9f3109f9e,subnet-018fa36a60509aee9],securityGroups=[sg-0547ebb40d03e880f],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Started task: $TASK_ARN"

          # Wait for task to be running
          aws ecs wait tasks-running \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN

          # Give runner time to register with GitHub
          sleep 10

  do-work:
    name: Run job on self-hosted runner
    needs: start-runner
    runs-on: [self-hosted, ecs, linux]

    steps:
      - name: Check runner
        run: echo "Running on ECS self-hosted runner!"

      - name: Check environment
        run: |
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "OS: $(uname -a)"

  stop-runner:
    name: Stop self-hosted runner
    needs: [start-runner, do-work]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop ECS runner task
        run: |
          TASK_ARN="${{ needs.start-runner.outputs.task_arn }}"
          echo "Task ARN: $TASK_ARN"

          if [ -z "$TASK_ARN" ]; then
            echo "No task ARN found, skipping stop"
            exit 0
          fi

          aws ecs stop-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task "$TASK_ARN" \
            --reason "Job completed"
