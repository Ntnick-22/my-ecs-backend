name: Test ECS Runner - 3 Jobs

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ECS_CLUSTER: my-ecs-demo
  TASK_DEFINITION: github-runner

jobs:

  start-runner:
    name: Start self-hosted runner
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      task_arn: ${{ steps.start.outputs.task_arn }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Start ECS runner task
        id: start
        run: |
          RUNNER_NAME="ecs-runner-${{ github.run_id }}"

          FULL_OUTPUT=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0c971a6f9f3109f9e,subnet-018fa36a60509aee9],securityGroups=[sg-0547ebb40d03e880f],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"runner\",\"environment\":[{\"name\":\"RUNNER_NAME\",\"value\":\"$RUNNER_NAME\"}]}]}" \
            --output json)

          echo "Full output: $FULL_OUTPUT"

          TASK_ARN=$(echo $FULL_OUTPUT | jq -r '.tasks[0].taskArn')
          echo "Task ARN: $TASK_ARN"

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "null" ]; then
            echo "Failed to start ECS task"
            echo "$FULL_OUTPUT" | jq '.failures'
            exit 1
          fi

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

          # Wait for task to be running
          aws ecs wait tasks-running \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN

          # Give runner time to register with GitHub
          sleep 30

  do-work:
    name: Run job on self-hosted runner
    needs: start-runner
    runs-on: [self-hosted, ecs, linux]

    steps:
      - name: Check runner
        run: echo "Running on ECS self-hosted runner!"

      - name: Check environment
        run: |
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "OS: $(uname -a)"

  stop-runner:
    name: Stop self-hosted runner
    needs: [start-runner, do-work]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop ECS runner tasks
        run: |
          echo "Finding all running github-runner tasks..."
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --family ${{ env.TASK_DEFINITION }} \
            --desired-status RUNNING \
            --region ${{ env.AWS_REGION }} \
            --query 'taskArns[]' \
            --output text)

          if [ -z "$TASK_ARNS" ]; then
            echo "No running runner tasks found"
            exit 0
          fi

          echo "Stopping tasks: $TASK_ARNS"
          for TASK_ARN in $TASK_ARNS; do
            aws ecs stop-task \
              --cluster ${{ env.ECS_CLUSTER }} \
              --task "$TASK_ARN" \
              --reason "Job completed" \
              --region ${{ env.AWS_REGION }}
            echo "Stopped: $TASK_ARN"
          done
